<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" aria-labelledby="t1" role="img">
  <title id="t1">SIGTS low-fi wireframe: login and registration</title>
  <desc>Centered auth card with brand area, fields, primary and secondary actions. WF-01.</desc>
  <rect fill="#f5f5f5" width="960" height="640"/>
  <text x="24" y="36" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#666">WF-01 | All roles | Authentication</text>
  <rect x="120" y="64" width="720" height="120" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="480" y="132" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="14" fill="#444">Logo, park name, hero (brand strip)</text>
  <rect x="300" y="212" width="360" height="340" fill="#fff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="480" y="248" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="15" font-weight="600" fill="#222">Login</text>
  <rect x="340" y="268" width="280" height="36" fill="#eee" stroke="#555" stroke-dasharray="4 3"/>
  <text x="350" y="292" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#666">Username or email</text>
  <rect x="340" y="316" width="280" height="36" fill="#eee" stroke="#555" stroke-dasharray="4 3"/>
  <text x="350" y="340" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#666">Password</text>
  <rect x="340" y="368" width="280" height="40" fill="#ccc" stroke="#333" stroke-width="2"/>
  <text x="480" y="394" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#222">Sign in</text>
  <text x="480" y="436" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#555">Forgot password | Register | MFA hint</text>
  <line x1="340" y1="456" x2="620" y2="456" stroke="#bbb"/>
  <text x="480" y="486" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#777">Demo or offline notice (optional)</text>
</svg>

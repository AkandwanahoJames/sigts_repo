  <rect x="200" y="48" width="760" height="56" fill="#fff" stroke="#333"/>
  <text x="220" y="82" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#222">Guide dashboard</text>
  <rect x="220" y="120" width="160" height="72" fill="#e0e0e0" stroke="#333"/>
  <text x="232" y="148" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">Shift / clock</text>

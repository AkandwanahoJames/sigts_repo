<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" aria-labelledby="t5" role="img">
  <title id="t5">SIGTS low-fi wireframe: guide dashboard</title>
  <desc>KPI strip, tour actions, assignments, messages, sync. WF-05.</desc>
  <rect fill="#f5f5f5" width="960" height="640"/>

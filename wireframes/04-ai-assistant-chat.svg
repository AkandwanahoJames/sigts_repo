<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" aria-labelledby="t4" role="img">
  <title id="t4">SIGTS low-fi wireframe: AI assistant chat</title>
  <desc>Conversation, sources line, fixed composer. Visitor-facing. WF-04.</desc>
  <rect fill="#f5f5f5" width="960" height="640"/>
  <text x="24" y="36" font-family="ui-sans-serif,sans-serif" font-size="13" fill="#666">WF-04 | Visitor | AI assistant</text>
  <rect x="48" y="56" width="864" height="52" fill="#fff" stroke="#333"/>
  <text x="64" y="88" font-family="ui-sans-serif,sans-serif" font-size="14" font-weight="600" fill="#222">Tour help / Bwindi assistant</text>
  <text x="620" y="88" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">Clear history | offline mode</text>
  <rect x="48" y="124" width="864" height="408" fill="#fafafa" stroke="#bbb"/>
  <rect x="80" y="148" width="360" height="48" fill="#ddd" stroke="#555" rx="4"/>
  <text x="92" y="178" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#333">User question</text>
  <rect x="520" y="208" width="360" height="88" fill="#e8e8e8" stroke="#555" rx="4"/>
  <text x="532" y="240" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#333">Assistant reply (formatted)</text>
  <text x="532" y="266" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#777">Sources | NLP mode | disclaimer</text>
  <rect x="80" y="316" width="300" height="44" fill="#ddd" stroke="#555" rx="4"/>
  <text x="92" y="342" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#333">Follow-up question</text>
  <rect x="48" y="548" width="864" height="68" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="64" y="562" width="700" height="40" fill="#eee" stroke="#555" stroke-dasharray="4 3"/>
  <text x="76" y="588" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#666">Type a question...</text>
  <rect x="780" y="562" width="116" height="40" fill="#ccc" stroke="#333"/>
  <text x="838" y="588" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="600" fill="#222">Send</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" aria-labelledby="t0" role="img">
  <title id="t0">SIGTS wireframe deck: stakeholder context (three client groups)</title>
  <desc>High-level map of who uses which capability areas; companion to numbered screen wireframes.</desc>
  <defs>
    <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <rect fill="#f5f5f5" width="960" height="640"/>
  <!-- Title block -->
  <rect x="24" y="20" width="912" height="56" fill="#fff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="48" y="48" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="600" fill="#222">SIGTS - system context (client walkthrough)</text>
  <text x="48" y="68" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#555">Low-fidelity wireframes - shared vocabulary for Visitor, Guide, and Park authority stakeholders.</text>
  <!-- Core platform -->
  <rect x="340" y="120" width="280" height="200" fill="#e8e8e8" stroke="#333" stroke-width="2" rx="4"/>
  <text x="480" y="152" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="13" font-weight="600" fill="#222">SIGTS platform</text>
  <text x="380" y="182" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">- Secure access &amp; roles (Auth)</text>
  <text x="380" y="204" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">- Map, content, AI assist (Web/PWA)</text>
  <text x="380" y="226" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">- Sightings, sync, ops data (API)</text>
  <text x="380" y="248" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">- Intranet / admin boundaries</text>
  <text x="380" y="288" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#666">Not implementation detail - scope anchor for review.</text>
  <!-- Three stakeholders -->
  <rect x="40" y="120" width="260" height="200" fill="#fff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="170" y="148" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="600" fill="#222">1) Visitor / tourist</text>
  <text x="56" y="176" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">Primary goals: plan &amp; enjoy visit, learn,</text>
  <text x="56" y="192" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">safe navigation, species discovery.</text>
  <text x="56" y="220" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">Wireframes: 01, 02, 03, 04, 08</text>
  <line x1="300" y1="220" x2="340" y2="220" stroke="#444" stroke-width="2" marker-end="url(#arrowEnd)"/>
  <rect x="660" y="120" width="260" height="200" fill="#fff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="790" y="148" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="600" fill="#222">2) Field guide</text>
  <text x="676" y="176" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">Primary goals: run tours, record sightings,</text>
  <text x="676" y="192" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">stay synchronized in the field.</text>
  <text x="676" y="220" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">Wireframes: 01, 05</text>
  <line x1="660" y1="220" x2="620" y2="220" stroke="#444" stroke-width="2" marker-end="url(#arrowEnd)"/>
  <rect x="140" y="380" width="680" height="220" fill="#fff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="480" y="412" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" font-weight="600" fill="#222">3) Park authority (IT &amp; staff)</text>
  <text x="160" y="440" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">Primary goals: oversight, assignments, compliance, internal</text>
  <text x="160" y="456" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#444">communications - without exposing guest-facing UX noise.</text>
  <text x="160" y="484" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#555">Wireframes: 01, 06, 07 (shared Auth with all groups)</text>
  <line x1="480" y1="380" x2="480" y2="320" stroke="#444" stroke-width="2" marker-end="url(#arrowEnd)"/>
  <!-- Footnote -->
  <text x="24" y="626" font-family="ui-sans-serif,sans-serif" font-size="9" fill="#777">Legend: arrows show primary reliance / primary UX surface. Overlapping capabilities are intentional - one platform, role-based entry.</text>
</svg>
